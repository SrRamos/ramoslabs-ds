# Cloudflare Pages config for the RamosLabs Design System (Astro static site).
# Production URL: https://design.ramoslabs.com (also https://ramoslabs-ds.pages.dev)
#
# The build output dir below is produced by a single Astro build:
#   bun install && bun run build --filter=site
# which compiles @ramoslabs/tokens first (turbo ^build), renders one HTML file per
# clean URL, and runs the agentic integration that emits llms.txt, llms-full.txt,
# registry.json, robots.txt, tokens.json, and AGENTS.md into the output.

name = "ramoslabs-ds"
compatibility_date = "2026-07-08"
pages_build_output_dir = "apps/site/dist"
