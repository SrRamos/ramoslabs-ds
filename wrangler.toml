# Cloudflare deployment config for the RamosLabs Design System.
# The static Astro build is served from the ASSETS binding; a tiny Worker (main) adds an
# MCP server at POST /mcp so agents get the DS as typed tools. Static assets are served
# directly for matching paths; only non-asset paths (e.g. /mcp) invoke the Worker.
#
# Production URL: https://design.ramoslabs.com (also https://ramoslabs-ds.<subdomain>.workers.dev)
# MCP endpoint:   https://design.ramoslabs.com/mcp  (and the workers.dev mirror)
#
# Workers Build settings (dashboard → the ramoslabs-ds Worker → Settings → Build):
#   Build command:  bun install && bun run build --filter=site
#   Deploy command: npx wrangler deploy
#   Root directory: (repo root, blank)
# A single Astro build (turbo compiles @ramoslabs/tokens first) renders every page and
# runs the agentic integration that writes llms.txt / registry.json / tokens.json / etc.
# into apps/site/dist. The MCP tools read those same assets via the ASSETS binding, so
# they can never drift from the site.

name = "ramoslabs-ds"
main = "./apps/site/worker/index.ts"
compatibility_date = "2026-07-08"

[assets]
directory = "./apps/site/dist"
binding = "ASSETS"
# Run the Worker before serving a static asset so it can count page views and agent-file
# fetches server-side (cookieless, no client JS). The Worker then serves the asset via the
# ASSETS binding, which still applies _headers/_redirects. Telemetry uses writeDataPoint,
# which is non-blocking, so this adds no user-facing latency.
run_worker_first = true

# Cookieless, no-PII usage telemetry. Query via the Analytics Engine SQL/GraphQL API.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "ramoslabs_ds"

# Workers Logs for debugging and log-based metrics.
[observability]
enabled = true
