<!-- SEO and social metadata for the RamosLabs Design System manager page.
     Storybook injects this file into the manager index.html <head> on every build.
     The document <title> is set separately by the agentic generator (it rewrites the
     static <title> in storybook-static/index.html), because a <title> here would only
     append a duplicate tag that Storybook's own template already owns. -->

<meta name="description" content="A mono-indigo, token-first design system. Foundations and patterns, free to use under the MIT License. Tokens are the single source of truth." />
<meta name="robots" content="index,follow" />
<meta name="theme-color" content="#4f46e5" />
<link rel="canonical" href="https://ramoslabs-ds.pages.dev/" />

<!-- Open Graph -->
<meta property="og:title" content="RamosLabs Design System" />
<meta property="og:description" content="A mono-indigo, token-first design system. Foundations and patterns, free to use under the MIT License." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://ramoslabs-ds.pages.dev/" />
<meta property="og:site_name" content="RamosLabs Design System" />
<!-- og:image intentionally omitted: no 1200x630 image asset exists yet. Add one, then
     reference it here (og:image, og:image:width=1200, og:image:height=630). -->

<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="RamosLabs Design System" />
<meta name="twitter:description" content="A mono-indigo, token-first design system. Foundations and patterns, free to use under the MIT License." />
